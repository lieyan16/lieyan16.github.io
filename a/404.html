            <script>
                (function () {   // 创建一个立即执行函数
                    if (document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") === '') {  // 检查 cookie 中是否存在名为“night”的属性
                        if (new Date().getHours() > 22 || new Date().getHours() < 6) {  // 检查当前时间是否处于晚上10点到早上6点之间
                            document.body.classList.add('night');  // 如果是，则为页面的<body>元素添加名为“night”的类
                            document.cookie = "night=1;path=/";  // 将 cookie 中名为“night”的属性设置为“1”，并将 cookie 路径设置为根路径
                        } else {
                            document.body.classList.remove('night');  // 如果不是，则为页面的<body>元素移除名为“night”的类
                            document.cookie = "night=0;path=/";  // 将 cookie 中名为“night”的属性设置为“0”，并将 cookie 路径设置为根路径
                        }
                    } else {  // 如果 cookie 中存在名为“night”的属性
                        var night = document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") || '0';  // 获取 cookie 中名为“night”的属性值
                        if (night == '0') {  // 如果属性值为“0”
                            document.body.classList.remove('night');  // 则为页面的<body>元素移除名为“night”的类
                        } else if (night == '1') {  // 如果属性值为“1”
                            document.body.classList.add('night');  // 则为页面的<body>元素添加名为“night”的类
                        }
                    }
                })();  // 立即执行函数的括号，表示在定义函数之后立即执行该函数

            </script>
